name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy scikit-learn imagehash opencv-python-headless \
                      scikit-image psycopg2-binary pydantic pydantic-settings \
                      fastapi sqlalchemy httpx Pillow

      - name: Run tests
        run: python tests/test_all.py
